<div class="row h-100">
    <div class="form-container middle">
        <div class="card w-80 p-5 br-20">
            <form (submit)="addUser()">
                <h1 class="text-center">
                  <!-- @if(formType==='add'){Add User}
                  @if(formType==='edit'){Edit User} -->
                  {{formType==='add' ? 'Add User': "Edit User"}}

                </h1>
                <div class="mt-3">
                    <label for="name" class="form-control-label">Name</label>
                    <input type="text" name="name" [(ngModel)]="name" (keyup)="checkIsNameInvalid()"   placeholder="Enter Name" id="name" class="form-control" required/>
                    <label for="name" class="form-control-error">{{errorName}}</label>
                </div>
                <div class="mt-3">
                    <label for="email" class="form-control-label">Email</label>
                    <input type="email" name="email" [(ngModel)]="email" (keyup)="checkIsEmailInvalid()" placeholder="Enter Email" id="email" class="form-control" required/>
                    <label for="name" class="form-control-error">{{errorEmail}}</label>
                </div>
                <div class="mt-3">
                    <label for="phone" class="form-control-label">Phone</label>
                    <input type="tel" name="phone" [(ngModel)]="phone" (keyup)="checkIsPhoneInvalid()" placeholder="Enter Phone" id="phone" class="form-control" required/>
                    <label for="name" class="form-control-error">{{errorPhone}}</label>
                </div>
                <div class="mt-3">
                     <!-- @if(formType==='add'){
                        <input type="submit" class="btn btn-primary" value="Add"/>
                    }
                     @if(formType==='edit'){
                        <input type="submit" class="btn btn-primary" value="Save"/>
                    } -->
                    <input type="submit" class="btn btn-primary" [value]="formType==='add' ? 'Add ': 'Save' " />

                </div>
            </form>
        </div>
    </div>
    <div class="table-container middle p-5">
      @if( users.length !==0){
        <table class="table w-80">
            <thead>
                <tr>
                    <th>User Id</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Delete</th>
                    <th>Edit</th>
                </tr>
            </thead>
            <tbody>
                @for (user of users; track $index) {
                    <tr>
                        <td>{{user.userId}}</td>
                        <td>{{user.name}}</td>
                        <td>{{user.email}}</td>
                        <td>{{user.phone}}</td>
                        <td><button class="btn btn-danger" (click)="deleteUser(user.userId)">Delete</button></td>
                        <td><button class="btn btn-primary" (click)="editUser(user.userId)">Edit</button></td>
                    </tr>
                }
            </tbody>
        </table>
      }@else{
        <h2 class="text-center">Users not added</h2>
      }
        
    </div>
</div>
